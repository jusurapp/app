name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb rpm
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libclang-dev \
            clang \
            cmake \
            pkg-config \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libavfilter-dev \
            libavdevice-dev \
            libswscale-dev \
            libswresample-dev \
            libfuse2 \
            vulkan-sdk

      # macOS dependencies
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg@7 cmake pkg-config
          FFMPEG_PREFIX=$(brew --prefix ffmpeg@7)
          SDKROOT=$(xcrun --show-sdk-path)
          echo "PKG_CONFIG_PATH=${FFMPEG_PREFIX}/lib/pkgconfig" >> $GITHUB_ENV
          echo "FFMPEG_DIR=${FFMPEG_PREFIX}" >> $GITHUB_ENV
          echo "SDKROOT=${SDKROOT}" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS_aarch64-apple-darwin=-I${FFMPEG_PREFIX}/include -isysroot ${SDKROOT}" >> $GITHUB_ENV

      # Windows dependencies
      - name: Install FFmpeg (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $FFMPEG_VER = "7.1"
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/$FFMPEG_VER/ffmpeg-$FFMPEG_VER-full_build-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg-build
          $ffdir = "C:\ffmpeg-build\ffmpeg-$FFMPEG_VER-full_build-shared"
          echo "FFMPEG_DIR=$ffdir" >> $env:GITHUB_ENV
          echo "$ffdir\bin" >> $env:GITHUB_PATH

      - name: Install FFmpeg (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-winarm64-gpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg-build
          $ffdir = (Get-ChildItem C:\ffmpeg-build -Directory | Select-Object -First 1).FullName
          # Use forward slashes for cross-tool compatibility (clang/bindgen path handling)
          $prefix = $ffdir -replace '\\', '/'
          echo "FFMPEG_DIR=$prefix" >> $env:GITHUB_ENV
          echo "$ffdir\bin" >> $env:GITHUB_PATH
          # Fix BtbN pkgconfig files: they have Linux-style paths from cross-compilation
          Get-ChildItem "$ffdir\lib\pkgconfig\*.pc" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace '(?m)^prefix=.*$', "prefix=$prefix"
            $content = $content -replace '(?m)^includedir=.*$', "includedir=$prefix/include"
            $content = $content -replace '(?m)^libdir=.*$', "libdir=$prefix/lib"
            $content | Set-Content $_.FullName
          }
          echo "PKG_CONFIG_LIBDIR=$prefix/lib/pkgconfig" >> $env:GITHUB_ENV
          # Explicitly pass FFmpeg include path to bindgen/clang for ARM64 target
          echo "BINDGEN_EXTRA_CLANG_ARGS_aarch64-pc-windows-msvc=-I$prefix/include" >> $env:GITHUB_ENV

      - name: Install LLVM (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          choco install llvm --yes
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $env:GITHUB_ENV

      - name: Install LLVM (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $ver = "19.1.7"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$ver/LLVM-$ver-woa64.exe"
          Invoke-WebRequest -Uri $url -OutFile LLVM-arm64.exe
          Start-Process -FilePath .\LLVM-arm64.exe -ArgumentList "/S" -Wait
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "1.4.309.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos-latest' && '11.0' || '' }}
          CMAKE_OSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos-latest' && '11.0' || '' }}
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.target == 'x86_64-pc-windows-msvc' && '-Clink-args=/FORCE:MULTIPLE' || '' }}
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.target == 'aarch64-pc-windows-msvc' && '-Clink-args=/FORCE:MULTIPLE' || '' }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ${{ matrix.platform == 'ubuntu-22.04' && '-Clink-args=-Wl,--allow-multiple-definition' || '' }}
        with:
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

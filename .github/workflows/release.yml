name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb rpm
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libclang-dev \
            clang \
            cmake \
            pkg-config \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libavfilter-dev \
            libavdevice-dev \
            libswscale-dev \
            libswresample-dev \
            libfuse2 \
            vulkan-sdk

      # macOS dependencies
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg@7 cmake pkg-config
          FFMPEG_PREFIX=$(brew --prefix ffmpeg@7)
          SDKROOT=$(xcrun --show-sdk-path)
          echo "PKG_CONFIG_PATH=${FFMPEG_PREFIX}/lib/pkgconfig" >> $GITHUB_ENV
          echo "FFMPEG_DIR=${FFMPEG_PREFIX}" >> $GITHUB_ENV
          echo "SDKROOT=${SDKROOT}" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS_aarch64-apple-darwin=-I${FFMPEG_PREFIX}/include -isysroot ${SDKROOT}" >> $GITHUB_ENV

      # Windows dependencies
      - name: Install FFmpeg (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $FFMPEG_VER = "7.1"
          $url = "https://github.com/GyanD/codexffmpeg/releases/download/$FFMPEG_VER/ffmpeg-$FFMPEG_VER-full_build-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg-build
          $ffdir = "C:\ffmpeg-build\ffmpeg-$FFMPEG_VER-full_build-shared"
          echo "FFMPEG_DIR=$ffdir" >> $env:GITHUB_ENV
          echo "$ffdir\bin" >> $env:GITHUB_PATH

      - name: Install FFmpeg (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-winarm64-gpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg-build
          $ffdir = (Get-ChildItem C:\ffmpeg-build -Directory | Select-Object -First 1).FullName
          echo "FFMPEG_DIR=$ffdir" >> $env:GITHUB_ENV
          echo "$ffdir\bin" >> $env:GITHUB_PATH
          # Fix BtbN pkgconfig files: they have Linux-style prefix from cross-compilation
          $prefix = $ffdir -replace '\\', '/'
          Get-ChildItem "$ffdir\lib\pkgconfig\*.pc" | ForEach-Object {
            (Get-Content $_.FullName -Raw) -replace '(?m)^prefix=.*$', "prefix=$prefix" |
            Set-Content $_.FullName
          }
          echo "PKG_CONFIG_LIBDIR=$prefix/lib/pkgconfig" >> $env:GITHUB_ENV

      - name: Install LLVM (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          choco install llvm --yes
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\lib" >> $env:GITHUB_ENV

      - name: Install LLVM (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $ver = "19.1.7"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$ver/LLVM-$ver-woa64.exe"
          Invoke-WebRequest -Uri $url -OutFile LLVM-arm64.exe
          Start-Process -FilePath .\LLVM-arm64.exe -ArgumentList "/S" -Wait
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "1.4.309.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath .\VulkanSDK.exe -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$ver" >> $env:GITHUB_ENV
          echo "C:\VulkanSDK\$ver\Bin" >> $env:GITHUB_PATH

      - name: Configure ARM64 Windows build tools
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          # ggml requires clang for ARM; use ClangCL toolset with x64 host tools
          echo "CMAKE_GENERATOR_TOOLSET=ClangCL,host=x64" >> $env:GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      # Windows: pre-build to locate DLLs, then copy them for NSIS bundling
      - name: Pre-build Rust (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: -Clink-args=/FORCE:MULTIPLE
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_RUSTFLAGS: -Clink-args=/FORCE:MULTIPLE
        run: cd src-tauri && cargo build --release --target ${{ matrix.target }}

      - name: Bundle native DLLs (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p src-tauri/libs
          # llama.cpp shared libraries
          find src-tauri/target/${{ matrix.target }}/release/build/llama-cpp-sys-2-*/out -name "*.dll" -exec cp {} src-tauri/libs/ \;
          # FFmpeg shared libraries
          cp "${FFMPEG_DIR}/bin/"*.dll src-tauri/libs/
          # Visual C++ runtime
          cp /c/Windows/System32/msvcp140.dll src-tauri/libs/
          cp /c/Windows/System32/vcruntime140.dll src-tauri/libs/
          cp /c/Windows/System32/vcruntime140_1.dll src-tauri/libs/
          # OpenMP runtime (used by llama.cpp)
          cp /c/Windows/System32/vcomp140.dll src-tauri/libs/
          echo "Bundled DLLs:"
          ls -la src-tauri/libs/
          # Create Tauri config override to include DLLs as resources
          echo '{"bundle":{"resources":{"libs/*":"."}}}' > src-tauri/tauri.dll-bundle.conf.json

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos-latest' && '11.0' || '' }}
          CMAKE_OSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'macos-latest' && '11.0' || '' }}
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.target == 'x86_64-pc-windows-msvc' && '-Clink-args=/FORCE:MULTIPLE' || '' }}
          CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_RUSTFLAGS: ${{ matrix.target == 'aarch64-pc-windows-msvc' && '-Clink-args=/FORCE:MULTIPLE' || '' }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: ${{ matrix.platform == 'ubuntu-22.04' && '-Clink-args=-Wl,--allow-multiple-definition' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Jusur ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install Jusur."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}${{ matrix.platform == 'windows-latest' && ' --config src-tauri/tauri.dll-bundle.conf.json' || '' }}
